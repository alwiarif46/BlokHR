<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <link rel="stylesheet" href="css/design-system.css">
  <style>
    .ai-chat { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .ai-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: var(--bg1);
      border-bottom: 1px solid var(--bd); flex-shrink: 0;
    }
    .ai-header-left { display: flex; align-items: center; gap: 10px; }
    .ai-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.125rem; }
    .ai-title { font-size: 1rem; font-weight: 600; }
    .ai-subtitle { font-size: 0.75rem; color: var(--tx3); }

    .ai-messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .msg { max-width: 80%; padding: 10px 14px; border-radius: var(--r); font-size: 0.875rem; line-height: 1.5; }
    .msg-user { align-self: flex-end; background: var(--accent); color: var(--bg0); border-bottom-right-radius: 4px; }
    .msg-ai { align-self: flex-start; background: var(--bg2); border: 1px solid var(--bd); border-bottom-left-radius: 4px; }
    .msg-ai pre { background: var(--bg3); padding: 8px 10px; border-radius: 4px; overflow-x: auto; font-family: var(--font-mono); font-size: 0.8125rem; margin: 8px 0; }
    .msg-time { font-size: 0.625rem; color: var(--tx4); margin-top: 4px; }
    .msg-typing { display: flex; gap: 4px; padding: 10px 14px; }
    .msg-typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--tx3); animation: typing-dot 1.4s infinite; }
    .msg-typing span:nth-child(2) { animation-delay: 0.2s; }
    .msg-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-dot { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

    .ai-input-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 20px; background: var(--bg1);
      border-top: 1px solid var(--bd); flex-shrink: 0;
    }
    .ai-input {
      flex: 1; padding: 10px 14px; background: var(--bg2);
      border: 1px solid var(--bd); border-radius: var(--r);
      color: var(--tx); font-family: var(--font-ui); font-size: 0.875rem;
      resize: none; max-height: 120px;
    }
    .ai-input:focus { outline: none; border-color: var(--accent); }
    .ai-send {
      width: 40px; height: 40px; border: none; border-radius: var(--r);
      background: var(--accent); color: var(--bg0); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.125rem; transition: opacity var(--transition);
    }
    .ai-send:hover { opacity: 0.9; }
    .ai-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .welcome-msg {
      text-align: center; padding: 40px 20px; color: var(--tx3);
    }
    .welcome-msg h3 { color: var(--tx); margin-bottom: 8px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .suggestion-chip {
      padding: 6px 14px; background: var(--bg2); border: 1px solid var(--bd);
      border-radius: 20px; font-size: 0.8125rem; color: var(--tx2);
      cursor: pointer; transition: all var(--transition);
    }
    .suggestion-chip:hover { border-color: var(--accent); color: var(--tx); }
  </style>
</head>
<body>
  <div class="ai-chat">
    <div class="ai-header">
      <div class="ai-header-left">
        <div class="ai-avatar">&#9733;</div>
        <div><div class="ai-title" id="aiTitle">AI Assistant</div><div class="ai-subtitle" id="aiSubtitle">Ask me anything about HR</div></div>
      </div>
      <button class="btn btn-ghost" id="clearBtn" title="Clear chat">Clear</button>
    </div>
    <div id="messages" class="ai-messages">
      <div class="welcome-msg" id="welcomeMsg">
        <h3>How can I help you?</h3>
        <p>Ask about attendance, leaves, policies, or anything HR-related.</p>
        <div class="suggestions" id="suggestions">
          <button class="suggestion-chip">What is my leave balance?</button>
          <button class="suggestion-chip">Show attendance summary</button>
          <button class="suggestion-chip">How do I apply for leave?</button>
          <button class="suggestion-chip">Explain the Bradford Score</button>
        </div>
      </div>
    </div>
    <div class="ai-input-bar">
      <textarea class="ai-input" id="userInput" rows="1" placeholder="Type a message..."></textarea>
      <button class="ai-send" id="sendBtn" title="Send">&#9654;</button>
    </div>
  </div>
  <div id="toastContainer" class="toast-container"></div>

  <script type="module">
    import { httpClient } from './js/httpClient.js';
    import { applyPrefsToDOM } from './js/prefsClient.js';

    let settingsCache = null, currentUser = null, isAdmin = false;
    let conversationId = null;
    let isLoading = false;
    const $ = id => document.getElementById(id);

    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) return;
      try {
        const ctx = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (ctx.v !== 1) return;
        settingsCache = ctx.settings; currentUser = ctx.user; isAdmin = ctx.isAdmin;
        if (ctx.prefs) applyPrefsToDOM(ctx.prefs);
        init();
      } catch (e) { console.error('Invalid CONTEXT', e); }
    });
    if (!window.frameElement) init();

    function init() {
      const persona = settingsCache?.ai?.persona;
      if (persona) $('aiSubtitle').textContent = persona.slice(0, 60);

      $('sendBtn').addEventListener('click', send);
      $('userInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      });
      $('clearBtn').addEventListener('click', clearChat);

      $('suggestions').querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          $('userInput').value = chip.textContent;
          send();
        });
      });

      // Auto-resize textarea
      $('userInput').addEventListener('input', () => {
        const el = $('userInput');
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      });

      loadHistory();
    }

    async function loadHistory() {
      try {
        const res = await httpClient.get('/api/copilot/history');
        const messages = res.messages || [];
        if (messages.length > 0) {
          $('welcomeMsg')?.remove();
          messages.forEach(m => appendMessage(m.role, m.content, m.timestamp));
          conversationId = res.conversationId || null;
        }
      } catch (_e) { /* no history available */ }
    }

    async function send() {
      const text = $('userInput').value.trim();
      if (!text || isLoading) return;

      $('welcomeMsg')?.remove();
      appendMessage('user', text);
      $('userInput').value = '';
      $('userInput').style.height = 'auto';

      isLoading = true;
      $('sendBtn').disabled = true;
      const typingEl = showTyping();

      try {
        const res = await httpClient.post('/api/copilot/chat', {
          message: text,
          conversationId,
        });
        conversationId = res.conversationId || conversationId;
        typingEl.remove();
        appendMessage('ai', res.reply || res.message || 'No response');
      } catch (err) {
        typingEl.remove();
        appendMessage('ai', 'Sorry, I encountered an error. Please try again.');
        showToast('AI request failed: ' + (err.message || ''), 'error');
      } finally {
        isLoading = false;
        $('sendBtn').disabled = false;
      }
    }

    function appendMessage(role, content, timestamp) {
      const div = document.createElement('div');
      div.className = `msg msg-${role === 'user' ? 'user' : 'ai'}`;
      div.innerHTML = role === 'user' ? esc(content) : formatAIResponse(content);
      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
      div.appendChild(time);
      $('messages').appendChild(div);
      $('messages').scrollTop = $('messages').scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg msg-ai msg-typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      $('messages').appendChild(div);
      $('messages').scrollTop = $('messages').scrollHeight;
      return div;
    }

    function clearChat() {
      $('messages').innerHTML = '';
      conversationId = null;
    }

    function formatAIResponse(text) {
      // Basic markdown: code blocks, bold, newlines
      let html = esc(text);
      html = html.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
      html = html.replace(/`([^`]+)`/g, '<code style="background:var(--bg3);padding:1px 4px;border-radius:3px;font-family:var(--font-mono);font-size:0.8125rem">$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      $('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
